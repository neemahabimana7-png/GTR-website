<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css" integrity="sha512-..." crossorigin="anonymous" referrerpolicy="no-referrer">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700;800&family=Open+Sans:wght@400;500;600&display=swap" rel="stylesheet">

<body>
    <div id="navbar-container"></div>
    <main>
     





        





    </main>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <script>
        // Load navbar from grittech.html
        fetch('grittech.html')
            .then(response => response.text())
            .then(data => {
                // Create a temporary div to parse the HTML
                const parser = new DOMParser();
                const doc = parser.parseFromString(data, 'text/html');
                
                // Extract the navbar element
                const navbar = doc.querySelector('nav.navbar');
                
                if (navbar) {
                    // Insert the navbar into the container
                    document.getElementById('navbar-container').appendChild(navbar);
                }
            })
            .catch(error => console.error('Error loading navbar:', error));
    </script>
</body>
</html>
